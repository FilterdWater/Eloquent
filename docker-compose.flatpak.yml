services:
  flatpak-builder:
    build:
      context: .
      dockerfile: Dockerfile.flatpak
    privileged: true
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "
        flatpak-builder --force-clean --repo=.flatpak-repo .flatpak-build re.sonny.Eloquent.json &&
        flatpak build-bundle .flatpak-repo re.sonny.Eloquent.flatpak re.sonny.Eloquent
      "
